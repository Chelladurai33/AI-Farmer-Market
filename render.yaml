services:
  # ─── Backend API (Node.js / Express) ─────────────────────────────────────────
  - type: web
    name: ai-farmer-marketplace-api
    env: node
    region: singapore        # Closest to India
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in Render Dashboard → Environment Variables:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false   # Set to your frontend Render URL e.g. https://ai-farmer-market.onrender.com

  # ─── Frontend (React / Vite static site) ─────────────────────────────────────
  - type: web
    name: ai-farmer-marketplace-client
    env: static
    region: singapore
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback — all non-asset routes go to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to your backend Render URL e.g. https://ai-farmer-marketplace-api.onrender.com/api
      - key: VITE_API_BASE_URL
        sync: false
